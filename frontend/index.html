<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Report Analyzer - 财务报表分析系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-paper: #faf9f6;
            --color-ink: #1a1a1a;
            --color-accent: #c41e3a;
            --color-gold: #b8860b;
            --color-muted: #6b6b6b;
            --color-border: #e5e5e5;
        }
        [data-theme="dark"] {
            --color-paper: #0d1117;
            --color-ink: #e6edf3;
            --color-accent: #ff6b6b;
            --color-gold: #ffd700;
            --color-muted: #8b949e;
            --color-border: #30363d;
        }
        body {
            font-family: 'Noto Serif SC', 'Crimson Text', serif;
            background: var(--color-paper);
            color: var(--color-ink);
        }
        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }
        .data-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 1px;
            background: var(--color-border);
        }
        .data-grid > div {
            background: var(--color-paper);
            padding: 12px 16px;
        }
        .metric-card {
            background: linear-gradient(135deg, rgba(196, 30, 58, 0.05) 0%, transparent 100%);
            border-left: 3px solid var(--color-accent);
        }
        .tab-active {
            border-bottom: 2px solid var(--color-accent);
            color: var(--color-accent);
        }
        .stock-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 模拟股票数据
        const mockStocks = [
            { code: "600519", name: "贵州茅台", market: "主板", price: 1688.88, change: 2.35 },
            { code: "000858", name: "五粮液", market: "主板", price: 158.66, change: -0.82 },
            { code: "002415", name: "海康威视", market: "中小板", price: 32.45, change: 1.25 },
            { code: "300750", name: "宁德时代", market: "创业板", price: 198.50, change: 3.12 },
            { code: "688981", name: "中芯国际", market: "科创板", price: 52.30, change: -1.45 },
        ];

        // 导航组件
        const Navigation = ({ currentPage, setPage, theme, toggleTheme }) => (
            <nav className="border-b" style={{ borderColor: 'var(--color-border)' }}>
                <div className="max-w-7xl mx-auto px-6 py-4">
                    <div className="flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-lg flex items-center justify-center" style={{ background: 'var(--color-accent)' }}>
                                <svg className="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
                                </svg>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold" style={{ fontFamily: 'Crimson Text, serif' }}>Financial Analyzer</h1>
                                <p className="text-xs" style={{ color: 'var(--color-muted)' }}>财务报表分析系统</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            {['search', 'statements', 'analysis', 'trend'].map((page) => (
                                <button
                                    key={page}
                                    onClick={() => setPage(page)}
                                    className={`text-sm font-medium transition-colors pb-1 ${
                                        currentPage === page ? 'tab-active' : ''
                                    }`}
                                    style={{ color: currentPage === page ? 'var(--color-accent)' : 'var(--color-muted)' }}
                                >
                                    {page === 'search' && '股票搜索'}
                                    {page === 'statements' && '财务报表'}
                                    {page === 'analysis' && '财务分析'}
                                    {page === 'trend' && '趋势分析'}
                                </button>
                            ))}
                            <button
                                onClick={toggleTheme}
                                className="p-2 rounded-lg transition-colors"
                                style={{ background: 'var(--color-border)' }}
                            >
                                {theme === 'light' ? '🌙' : '☀️'}
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
        );

        // 搜索页面
        const SearchPage = ({ onSelectStock }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [filteredStocks, setFilteredStocks] = useState(mockStocks);

            useEffect(() => {
                const filtered = mockStocks.filter(stock =>
                    stock.code.includes(searchTerm) ||
                    stock.name.includes(searchTerm)
                );
                setFilteredStocks(filtered);
            }, [searchTerm]);

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="text-center mb-12">
                        <h2 className="text-4xl font-bold mb-4" style={{ fontFamily: 'Crimson Text, serif' }}>
                            探索 A 股上市公司
                        </h2>
                        <p className="text-lg mb-8" style={{ color: 'var(--color-muted)' }}>
                            智能财务报表分析 · 杜邦分析 · 趋势预测
                        </p>
                        <div className="max-w-2xl mx-auto relative">
                            <input
                                type="text"
                                placeholder="输入股票代码或名称..."
                                value={searchTerm}
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full px-6 py-4 rounded-xl border-2 text-lg outline-none transition-all"
                                style={{
                                    borderColor: searchTerm ? 'var(--color-accent)' : 'var(--color-border)',
                                    background: 'var(--color-paper)',
                                    color: 'var(--color-ink)'
                                }}
                            />
                            <svg className="absolute right-6 top-1/2 -translate-y-1/2 w-6 h-6" style={{ color: 'var(--color-muted)' }} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                            </svg>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredStocks.map((stock) => (
                            <div
                                key={stock.code}
                                onClick={() => onSelectStock(stock)}
                                className="stock-card p-6 rounded-xl border cursor-pointer transition-all duration-300"
                                style={{ borderColor: 'var(--color-border)', background: 'var(--color-paper)' }}
                            >
                                <div className="flex justify-between items-start mb-4">
                                    <div>
                                        <h3 className="text-2xl font-bold mb-1">{stock.name}</h3>
                                        <span className="text-sm font-mono px-2 py-1 rounded" style={{ background: 'var(--color-border)' }}>{stock.code}</span>
                                    </div>
                                    <span className="text-xs px-2 py-1 rounded border" style={{ borderColor: 'var(--color-border)' }}>{stock.market}</span>
                                </div>
                                <div className="flex justify-between items-end">
                                    <div>
                                        <p className="text-sm mb-1" style={{ color: 'var(--color-muted)' }}>最新价</p>
                                        <p className="text-3xl font-bold font-mono" style={{ color: 'var(--color-accent)' }}>¥{stock.price}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm font-medium" style={{ color: stock.change >= 0 ? '#22c55e' : '#ef4444' }}>
                                            {stock.change >= 0 ? '+' : ''}{stock.change}%
                                        </p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 财务报表页面
        const StatementsPage = ({ selectedStock }) => {
            const [activeTab, setActiveTab] = useState('balance');

            const balanceSheetData = [
                { item: '流动资产合计', current: '123,456,789', previous: '112,345,678', change: '+9.89%' },
                { item: '非流动资产合计', current: '234,567,890', previous: '223,456,789', change: '+4.97%' },
                { item: '资产总计', current: '358,024,679', previous: '335,802,467', change: '+6.62%' },
                { item: '流动负债合计', current: '45,678,901', previous: '48,901,234', change: '-6.59%' },
                { item: '非流动负债合计', current: '12,345,679', previous: '13,456,790', change: '-8.26%' },
                { item: '负债合计', current: '58,024,580', previous: '62,358,024', change: '-6.95%' },
                { item: '所有者权益合计', current: '300,000,099', previous: '273,444,443', change: '+9.71%' },
            ];

            const incomeData = [
                { item: '营业总收入', current: '150,000,000', previous: '135,000,000', change: '+11.11%' },
                { item: '营业总成本', current: '50,000,000', previous: '48,000,000', change: '+4.17%' },
                { item: '营业利润', current: '80,000,000', previous: '70,000,000', change: '+14.29%' },
                { item: '利润总额', current: '85,000,000', previous: '75,000,000', change: '+13.33%' },
                { item: '净利润', current: '70,000,000', previous: '60,000,000', change: '+16.67%' },
            ];

            const cashflowData = [
                { item: '经营活动现金流量净额', current: '90,000,000', previous: '85,000,000', change: '+5.88%' },
                { item: '投资活动现金流量净额', current: '-20,000,000', previous: '-25,000,000', change: '+20.00%' },
                { item: '筹资活动现金流量净额', current: '-10,000,000', previous: '-15,000,000', change: '+33.33%' },
                { item: '现金净增加额', current: '60,000,000', previous: '45,000,000', change: '+33.33%' },
            ];

            const getData = () => {
                switch(activeTab) {
                    case 'balance': return balanceSheetData;
                    case 'income': return incomeData;
                    case 'cashflow': return cashflowData;
                    default: return balanceSheetData;
                }
            };

            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold mb-2" style={{ fontFamily: 'Crimson Text, serif' }}>
                            {selectedStock ? selectedStock.name : '贵州茅台'}
                        </h2>
                        <div className="flex items-center gap-4">
                            <span className="font-mono text-lg" style={{ color: 'var(--color-muted)' }}>
                                {selectedStock ? selectedStock.code : '600519'}
                            </span>
                            <span className="text-sm px-3 py-1 rounded-full border" style={{ borderColor: 'var(--color-border)' }}>
                                2023年年报
                            </span>
                        </div>
                    </div>

                    <div className="flex gap-8 mb-6 border-b" style={{ borderColor: 'var(--color-border)' }}>
                        {[
                            { key: 'balance', label: '资产负债表' },
                            { key: 'income', label: '利润表' },
                            { key: 'cashflow', label: '现金流量表' }
                        ].map((tab) => (
                            <button
                                key={tab.key}
                                onClick={() => setActiveTab(tab.key)}
                                className={`pb-4 text-sm font-medium transition-all ${activeTab === tab.key ? 'tab-active' : ''}`}
                                style={{ color: activeTab === tab.key ? 'var(--color-accent)' : 'var(--color-muted)' }}
                            >
                                {tab.label}
                            </button>
                        ))}
                    </div>

                    <div className="rounded-xl overflow-hidden border" style={{ borderColor: 'var(--color-border)' }}>
                        <div className="data-grid font-medium text-sm" style={{ background: 'var(--color-border)' }}>
                            <div style={{ background: 'var(--color-paper)', fontWeight: 600 }}>项目</div>
                            <div style={{ background: 'var(--color-paper)', fontWeight: 600 }} className="text-right">本期金额 (元)</div>
                            <div style={{ background: 'var(--color-paper)', fontWeight: 600 }} className="text-right">上期金额 (元)</div>
                            <div style={{ background: 'var(--color-paper)', fontWeight: 600 }} className="text-right">变动</div>
                        </div>
                        {getData().map((row, index) => (
                            <div key={index} className="data-grid text-sm">
                                <div style={{ fontWeight: 500 }}>{row.item}</div>
                                <div className="text-right font-mono">{row.current}</div>
                                <div className="text-right font-mono" style={{ color: 'var(--color-muted)' }}>{row.previous}</div>
                                <div className={`text-right font-mono ${row.change.startsWith('+') ? 'text-green-600' : 'text-red-600'}`}>
                                    {row.change}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 财务分析页面
        const AnalysisPage = ({ selectedStock }) => {
            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold mb-2" style={{ fontFamily: 'Crimson Text, serif' }}>
                            财务指标分析
                        </h2>
                        <p style={{ color: 'var(--color-muted)' }}>
                            {selectedStock ? `${selectedStock.name} (${selectedStock.code})` : '贵州茅台 (600519)'}
                        </p>
                    </div>

                    {/* 盈利能力 */}
                    <div className="mb-10">
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <span className="w-1 h-6 rounded-full" style={{ background: 'var(--color-accent)' }}></span>
                            盈利能力指标
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {[
                                { name: '净资产收益率 (ROE)', value: '25.68%', desc: '股东权益回报率', status: '优秀' },
                                { name: '总资产收益率 (ROA)', value: '18.45%', desc: '资产利用效率', status: '良好' },
                                { name: '毛利率', value: '91.54%', desc: '产品盈利能力', status: '优秀' },
                            ].map((metric, idx) => (
                                <div key={idx} className="metric-card p-6 rounded-xl">
                                    <p className="text-sm mb-2" style={{ color: 'var(--color-muted)' }}>{metric.name}</p>
                                    <p className="text-4xl font-bold font-mono mb-2" style={{ color: 'var(--color-accent)' }}>{metric.value}</p>
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs" style={{ color: 'var(--color-muted)' }}>{metric.desc}</span>
                                        <span className="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700">{metric.status}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 偿债能力 */}
                    <div className="mb-10">
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <span className="w-1 h-6 rounded-full" style={{ background: 'var(--color-accent)' }}></span>
                            偿债能力指标
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            {[
                                { name: '流动比率', value: '2.85', desc: '短期偿债能力', status: '良好' },
                                { name: '速动比率', value: '2.12', desc: '快速变现能力', status: '良好' },
                                { name: '资产负债率', value: '16.21%', desc: '长期偿债风险', status: '安全' },
                            ].map((metric, idx) => (
                                <div key={idx} className="metric-card p-6 rounded-xl">
                                    <p className="text-sm mb-2" style={{ color: 'var(--color-muted)' }}>{metric.name}</p>
                                    <p className="text-4xl font-bold font-mono mb-2" style={{ color: 'var(--color-accent)' }}>{metric.value}</p>
                                    <div className="flex justify-between items-center">
                                        <span className="text-xs" style={{ color: 'var(--color-muted)' }}>{metric.desc}</span>
                                        <span className="text-xs px-2 py-1 rounded-full bg-blue-100 text-blue-700">{metric.status}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* 杜邦分析 */}
                    <div className="mb-10">
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <span className="w-1 h-6 rounded-full" style={{ background: 'var(--color-accent)' }}></span>
                            杜邦分析 (ROE 拆解)
                        </h3>
                        <div className="p-8 rounded-xl border" style={{ borderColor: 'var(--color-border)' }}>
                            <div className="flex flex-col items-center">
                                <div className="text-center mb-6">
                                    <p className="text-sm mb-2" style={{ color: 'var(--color-muted)' }}>净资产收益率 (ROE)</p>
                                    <p className="text-5xl font-bold font-mono" style={{ color: 'var(--color-accent)' }}>25.68%</p>
                                </div>
                                <div className="w-full max-w-3xl">
                                    <div className="flex justify-between items-center mb-4">
                                        <div className="text-center flex-1">
                                            <p className="text-xs mb-1" style={{ color: 'var(--color-muted)' }}>销售净利率</p>
                                            <p className="text-2xl font-bold font-mono">46.67%</p>
                                        </div>
                                        <span className="text-2xl" style={{ color: 'var(--color-muted)' }}>×</span>
                                        <div className="text-center flex-1">
                                            <p className="text-xs mb-1" style={{ color: 'var(--color-muted)' }}>总资产周转率</p>
                                            <p className="text-2xl font-bold font-mono">0.55</p>
                                        </div>
                                        <span className="text-2xl" style={{ color: 'var(--color-muted)' }}>×</span>
                                        <div className="text-center flex-1">
                                            <p className="text-xs mb-1" style={{ color: 'var(--color-muted)' }}>权益乘数</p>
                                            <p className="text-2xl font-bold font-mono">1.19</p>
                                        </div>
                                    </div>
                                    <div className="h-px w-full my-4" style={{ background: 'var(--color-border)' }}></div>
                                    <div className="grid grid-cols-3 gap-4 text-xs" style={{ color: 'var(--color-muted)' }}>
                                        <p className="text-center">盈利能力：每元销售收入带来的净利润</p>
                                        <p className="text-center">运营效率：资产周转利用效率</p>
                                        <p className="text-center">财务杠杆：负债与权益的比例关系</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // 趋势分析页面
        const TrendPage = ({ selectedStock }) => {
            return (
                <div className="max-w-7xl mx-auto px-6 py-8">
                    <div className="mb-8">
                        <h2 className="text-3xl font-bold mb-2" style={{ fontFamily: 'Crimson Text, serif' }}>
                            趋势分析
                        </h2>
                        <p style={{ color: 'var(--color-muted)' }}>
                            {selectedStock ? `${selectedStock.name} (${selectedStock.code})` : '贵州茅台 (600519)'}
                        </p>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        {/* 营收趋势 */}
                        <div className="p-6 rounded-xl border" style={{ borderColor: 'var(--color-border)' }}>
                            <h3 className="text-lg font-bold mb-6">营业收入趋势</h3>
                            <div className="space-y-4">
                                {[
                                    { year: '2023', value: '150.00亿', growth: '+11.11%', yoy: '16.7%' },
                                    { year: '2022', value: '135.00亿', growth: '+8.50%', yoy: '12.3%' },
                                    { year: '2021', value: '124.42亿', growth: '+12.18%', yoy: '15.2%' },
                                    { year: '2020', value: '110.92亿', growth: '+10.77%', yoy: '11.8%' },
                                ].map((item, idx) => (
                                    <div key={idx} className="flex items-center justify-between p-4 rounded-lg" style={{ background: 'rgba(196, 30, 58, 0.03)' }}>
                                        <div>
                                            <p className="font-bold">{item.year}年</p>
                                            <p className="text-sm" style={{ color: 'var(--color-muted)' }}>同比增长 {item.growth}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xl font-bold font-mono" style={{ color: 'var(--color-accent)' }}>{item.value}</p>
                                            <p className="text-xs" style={{ color: 'var(--color-muted)' }}>环比 {item.yoy}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* 净利润趋势 */}
                        <div className="p-6 rounded-xl border" style={{ borderColor: 'var(--color-border)' }}>
                            <h3 className="text-lg font-bold mb-6">净利润趋势</h3>
                            <div className="space-y-4">
                                {[
                                    { year: '2023', value: '70.00亿', growth: '+16.67%', yoy: '19.2%' },
                                    { year: '2022', value: '60.00亿', growth: '+10.29%', yoy: '13.5%' },
                                    { year: '2021', value: '54.40亿', growth: '+13.33%', yoy: '14.8%' },
                                    { year: '2020', value: '48.00亿', growth: '+9.09%', yoy: '10.2%' },
                                ].map((item, idx) => (
                                    <div key={idx} className="flex items-center justify-between p-4 rounded-lg" style={{ background: 'rgba(196, 30, 58, 0.03)' }}>
                                        <div>
                                            <p className="font-bold">{item.year}年</p>
                                            <p className="text-sm" style={{ color: 'var(--color-muted)' }}>同比增长 {item.growth}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xl font-bold font-mono" style={{ color: 'var(--color-accent)' }}>{item.value}</p>
                                            <p className="text-xs" style={{ color: 'var(--color-muted)' }}>环比 {item.yoy}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* ROE 趋势 */}
                    <div className="mt-8 p-6 rounded-xl border" style={{ borderColor: 'var(--color-border)' }}>
                        <h3 className="text-lg font-bold mb-6">净资产收益率 (ROE) 趋势</h3>
                        <div className="grid grid-cols-4 gap-6">
                            {[
                                { year: '2023', value: '25.68%', status: '优秀' },
                                { year: '2022', value: '24.12%', status: '优秀' },
                                { year: '2021', value: '23.45%', status: '优秀' },
                                { year: '2020', value: '22.89%', status: '优秀' },
                            ].map((item, idx) => (
                                <div key={idx} className="text-center p-6 rounded-xl" style={{ background: 'rgba(196, 30, 58, 0.05)' }}>
                                    <p className="text-sm mb-2" style={{ color: 'var(--color-muted)' }}>{item.year}年</p>
                                    <p className="text-3xl font-bold font-mono mb-2" style={{ color: 'var(--color-accent)' }}>{item.value}</p>
                                    <span className="text-xs px-2 py-1 rounded-full bg-green-100 text-green-700">{item.status}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        // 主应用
        const App = () => {
            const [currentPage, setPage] = useState('search');
            const [selectedStock, setSelectedStock] = useState(null);
            const [theme, setTheme] = useState('light');

            const toggleTheme = () => {
                const newTheme = theme === 'light' ? 'dark' : 'light';
                setTheme(newTheme);
                document.documentElement.setAttribute('data-theme', newTheme);
            };

            const handleSelectStock = (stock) => {
                setSelectedStock(stock);
                setPage('statements');
            };

            return (
                <div className="min-h-screen" style={{ background: 'var(--color-paper)', color: 'var(--color-ink)' }}>
                    <Navigation
                        currentPage={currentPage}
                        setPage={setPage}
                        theme={theme}
                        toggleTheme={toggleTheme}
                    />
                    {currentPage === 'search' && <SearchPage onSelectStock={handleSelectStock} />}
                    {currentPage === 'statements' && <StatementsPage selectedStock={selectedStock} />}
                    {currentPage === 'analysis' && <AnalysisPage selectedStock={selectedStock} />}
                    {currentPage === 'trend' && <TrendPage selectedStock={selectedStock} />}
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
